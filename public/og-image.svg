<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c150f"/>
      <stop offset="100%" stop-color="#13201a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(109,154,72,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="rgba(109,154,72,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- leaf accent -->
  <circle cx="1050" cy="120" r="180" fill="rgba(109,154,72,0.06)"/>
  <!-- bottom accent line -->
  <rect x="100" y="520" width="80" height="3" rx="1.5" fill="#6d9a48"/>
  <!-- title -->
  <text x="100" y="260" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="500" fill="#ddd9ca" letter-spacing="-1.5">Jason Marsh</text>
  <!-- subtitle -->
  <text x="100" y="330" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#a0a090">Developer and technologist. Builder of AI-integrated tools.</text>
  <!-- domain -->
  <text x="100" y="490" font-family="'Courier New', monospace" font-size="22" fill="#787870" letter-spacing="-0.5">marsh.city</text>
</svg>
